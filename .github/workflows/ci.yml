name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values so Settings loads + the app builds; tests mock real services.
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_KEY: dummy-service-key
      CLERK_JWKS_URL: https://dummy.clerk.accounts.dev/.well-known/jwks.json
      RATE_LIMIT_STORAGE: memory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  frontend:
    name: Frontend (lint + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Dummy value so the build's module-scope env validation (src/lib/env.ts)
      # passes. Nothing is fetched at build time — every route that talks to the
      # API is dynamic — so the URL only has to exist, not resolve. This is the
      # only var the build needs; Clerk keys are not read during prerender.
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # Vitest (jsdom). Runs before the build because it is ~4s and catches the
      # class of bug the build cannot see: the build proves the app compiles,
      # not that it behaves. Includes proxy.test.ts, which walks the real
      # public/ directory and fails if an asset's extension is missing from the
      # middleware matcher — the bug that made the landing video 307 to
      # /sign-in, and the .otf fonts after it.
      - run: npm test
      # Blocking type gate AND the bundle that ships. `next build` type-checks the
      # whole tsconfig project (no typescript.ignoreBuildErrors in next.config.ts)
      # — including files no route imports — so a separate `tsc --noEmit` adds
      # nothing. It also cannot run first: `PageProps` is generated into
      # .next/types/routes.d.ts by the build, and tsconfig includes that path, so
      # tsc on a clean checkout fails with TS2304 before the build has emitted it.
      # Next 16 has no standalone `typegen` command to sidestep that ordering.
      - run: npm run build

  frontend-e2e:
    name: Frontend (e2e smoke)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Same dummy value the build job uses. The Clerk fakes the e2e run needs
      # live in playwright.config.ts's webServer.env, not here, because they must
      # be present at build time (NEXT_PUBLIC_* is inlined) AND the config owns
      # the build+start, so keeping them there is the single source of truth.
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      # Chromium only (see playwright.config.ts). --with-deps pulls the system
      # libraries the headless browser needs on a bare ubuntu runner.
      - run: npx playwright install --with-deps chromium
      # The config's webServer runs `next build && next start`, so this both
      # builds the production bundle and drives it in a real browser. Guards what
      # unit tests structurally cannot: that assets are served rather than 307'd
      # (the webm/otf bugs), the video actually plays, and the signed-out CTAs
      # reach Clerk.
      - run: npm run test:e2e

  extension-v2:
    name: Extension (typecheck + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension-v2/package-lock.json
      - run: npm ci
      # Fast, offline unit suite (mocked embeddings). The model-backed eval
      # (`npm run eval`) is intentionally excluded — it downloads ~90 MB and is a
      # run-when-you-touch-matching tool, not a per-push gate.
      - run: npm test
      # `build` runs `tsc` first, so this is a STRICT type-check gate as well as
      # producing the shipped MV3 bundle. No type debt here, so it blocks.
      - run: npm run build
