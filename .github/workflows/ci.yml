name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values so Settings loads + the app builds; tests mock real services.
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_KEY: dummy-service-key
      CLERK_JWKS_URL: https://dummy.clerk.accounts.dev/.well-known/jwks.json
      RATE_LIMIT_STORAGE: memory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    env:
      # Dummy value so the build's module-scope env validation (src/lib/env.ts)
      # passes. Nothing is fetched at build time — every route that talks to the
      # API is dynamic — so the URL only has to exist, not resolve. This is the
      # only var the build needs; Clerk keys are not read during prerender.
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # Blocking: the type debt this used to tolerate is paid off (0 errors), so
      # the gate is closed to keep it that way.
      - run: npx tsc --noEmit
      # The build is what actually ships, and it type-checks the route graph that
      # `tsc --noEmit` alone doesn't exercise (prerender, page data collection).
      - run: npm run build

  extension-v2:
    name: Extension (typecheck + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension-v2/package-lock.json
      - run: npm ci
      # Fast, offline unit suite (mocked embeddings). The model-backed eval
      # (`npm run eval`) is intentionally excluded — it downloads ~90 MB and is a
      # run-when-you-touch-matching tool, not a per-push gate.
      - run: npm test
      # `build` runs `tsc` first, so this is a STRICT type-check gate as well as
      # producing the shipped MV3 bundle. No type debt here, so it blocks.
      - run: npm run build
