name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Dummy values so Settings loads + the app builds; tests mock real services.
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_KEY: dummy-service-key
      CLERK_JWKS_URL: https://dummy.clerk.accounts.dev/.well-known/jwks.json
      RATE_LIMIT_STORAGE: memory
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: python -m pytest -q

  frontend:
    name: Frontend (lint + typecheck)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run lint
      # Type-check reported but non-blocking until pre-existing type debt is
      # burned down (next build also type-checks what actually ships).
      - run: npx tsc --noEmit
        continue-on-error: true

  extension-v2:
    name: Extension (typecheck + tests + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: extension-v2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: extension-v2/package-lock.json
      - run: npm ci
      # Fast, offline unit suite (mocked embeddings). The model-backed eval
      # (`npm run eval`) is intentionally excluded — it downloads ~90 MB and is a
      # run-when-you-touch-matching tool, not a per-push gate.
      - run: npm test
      # `build` runs `tsc` first, so this is a STRICT type-check gate as well as
      # producing the shipped MV3 bundle. No type debt here, so it blocks.
      - run: npm run build
